version: "3.8"

services:
  mongo:
    image: mongo
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  app:
    image: python:3.12-slim
    container_name: pdf_extractext_app
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      MONGO_URL: mongodb://mongo:27017
      DATABASE_NAME: pdf_extractext
    command: [ "sh", "-c", "pip install -e . && uvicorn main:app --host 0.0.0.0 --port 8000 --reload" ]
    depends_on:
      - mongo

volumes:
  mongo_data: